name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all
      - run: cargo clippy -- -D warnings

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: kobana-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: kobana-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: kobana-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: kobana-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: kobana-windows-amd64.exe

    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Cross-compilation toolchain for Linux ARM64
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/kobana ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/kobana.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'release:')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' crates/kobana-cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Kobana CLI ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: artifacts/**/*

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Compute SHA256 for each binary
          SHA_DARWIN_ARM64=$(shasum -a 256 artifacts/kobana-darwin-arm64/kobana-darwin-arm64 | cut -d' ' -f1)
          SHA_DARWIN_AMD64=$(shasum -a 256 artifacts/kobana-darwin-amd64/kobana-darwin-amd64 | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(shasum -a 256 artifacts/kobana-linux-arm64/kobana-linux-arm64 | cut -d' ' -f1)
          SHA_LINUX_AMD64=$(shasum -a 256 artifacts/kobana-linux-amd64/kobana-linux-amd64 | cut -d' ' -f1)

          # Generate formula
          cat > /tmp/kobana.rb << FORMULA
          class Kobana < Formula
            desc "CLI for the Kobana financial API (v1 and v2)"
            homepage "https://github.com/universokobana/kobana-cli"
            version "${VERSION#v}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/universokobana/kobana-cli/releases/download/${VERSION}/kobana-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/universokobana/kobana-cli/releases/download/${VERSION}/kobana-darwin-amd64"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/universokobana/kobana-cli/releases/download/${VERSION}/kobana-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/universokobana/kobana-cli/releases/download/${VERSION}/kobana-linux-amd64"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install stable.url.split("/").last => "kobana"
            end

            test do
              assert_match "kobana", shell_output("#{bin}/kobana --version")
            end
          end
          FORMULA

          # Push to homebrew-tap repo
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/universokobana/homebrew-tap.git /tmp/homebrew-tap
          cp /tmp/kobana.rb /tmp/homebrew-tap/Formula/kobana.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kobana.rb
          git commit -m "update kobana to ${VERSION}" || echo "No changes"
          git push
